name: Master Orchestration (Genesis AI Systems)
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run system health check
        run: |
          echo "🤖 Genesis AI Systems — Master Health Check"
          echo "============================================"
          echo "Time: $(date)"
          echo "Commit: $GITHUB_SHA"
          echo ""

          echo "Checking main site..."
          MAIN=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 https://genesisai.systems \
            || echo "000")
          echo "Main site: $MAIN"

          echo "Checking demos page..."
          DEMOS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://genesisai.systems/demos.html \
            || echo "000")
          echo "Demos page: $DEMOS"

          echo "Checking demo server..."
          SERVER=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://genesis-ai-systems-demo.onrender.com \
            || echo "000")
          echo "Demo server: $SERVER"

          echo ""
          if [ "$MAIN" = "200" ]; then
            echo "✅ ALL SYSTEMS OPERATIONAL"
          else
            echo "⚠️ MAIN SITE MAY BE DOWN: $MAIN"
          fi

      - name: Save health report
        run: |
          mkdir -p health-reports
          cat > health-reports/latest.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "$GITHUB_SHA",
            "business": "Genesis AI Systems",
            "founder": "Trendell Fordham",
            "website": "https://genesisai.systems",
            "demos": "https://genesisai.systems/demos.html",
            "demo_server": "https://genesis-ai-systems-demo.onrender.com",
            "status": "checked"
          }
          EOF
          cat health-reports/latest.json

      - name: Report complete
        run: |
          echo ""
          echo "✅ Master Orchestration complete"
          echo "Genesis AI Systems — genesisai.systems"
          echo "Trendell Fordham, Detroit MI"
          echo "Time: $(date)"
