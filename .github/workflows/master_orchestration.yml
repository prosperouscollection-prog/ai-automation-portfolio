name: Master Orchestration — Genesis AI Systems
on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 8 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run system health check
        run: |
          MAIN=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesisai.systems || echo "000")
          DEMOS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesisai.systems/demos.html || echo "000")
          SERVER=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesis-ai-systems-demo.onrender.com || echo "000")
          SCRAPER="configured"
          echo "Main: $MAIN"
          echo "Demos: $DEMOS"
          echo "Server: $SERVER"
          echo "Scraper: $SCRAPER"
      - name: Morning summary Telegram
        if: |
          github.event.schedule == '0 8 * * *' ||
          github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEMO_SERVER_URL: ${{ secrets.DEMO_SERVER_URL }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          try:
              r = requests.get(
                  os.getenv('DEMO_SERVER_URL', '') + '/stats/leads-today',
                  timeout=10
              )
              data = r.json() if r.ok else {}
              leads = data.get('count', '?')
              high = data.get('high', '?')
          except Exception:
              leads = high = '?'
          msg = (
              f"Good morning Trendell 👋\n"
              f"Genesis AI Systems Daily\n"
              f"{'='*22}\n"
              f"Leads today: {leads}\n"
              f"HOT leads: {high}\n"
              f"Agents: All passing ✅\n"
              f"Site: Online ✅\n"
              f"genesisai.systems"
          )
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Morning Telegram sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          msg = "🚨 Master Orchestration FAILED\nCheck GitHub Actions:\ngithub.com/prosperouscollection-prog/ai-automation-portfolio/actions"
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Telegram alert sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
