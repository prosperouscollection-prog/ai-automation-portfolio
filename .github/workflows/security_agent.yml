# Genesis AI Systems Security Agent Workflow
# https://genesisai.systems | Founder: Trendell Fordham
# Monitors for sensitive info leakage, Python security, XSS, HTTPS, exposed .env, and notifies by severity.

name: SECURITY_AGENT

on:
  schedule:
    # Every hour on the hour
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security:
    name: Security Scan & Notification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      SITE_URL: ${{ secrets.SITE_URL }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/scripts/requirements.txt

      - name: List files in working directory
        run: ls -la

      # Check 1: Search website export for exposed keys (e.g. API keys, tokens, creds)
      - name: Download portfolio website for static analysis
        run: |
          wget -q $SITE_URL -O PORTFOLIO_WEBSITE.html

      - name: Check for exposed keys in PORTFOLIO_WEBSITE.html
        run: |
          python .github/workflows/scripts/search_exposed_keys.py PORTFOLIO_WEBSITE.html
        continue-on-error: true

      # Check 2: Search hardcoded credentials in repo
      - name: Scan for hardcoded credentials / keys
        run: |
          python .github/workflows/scripts/search_hardcoded_credentials.py .
        continue-on-error: true

      # Check 3: Insecure external scripts (non-HTTPS, or suspicious sources)
      - name: Check for insecure or non-HTTPS external scripts
        run: |
          python .github/workflows/scripts/search_insecure_external_scripts.py PORTFOLIO_WEBSITE.html
        continue-on-error: true

      # Check 4: Find links missing HTTPS
      - name: Search for missing HTTPS in links
        run: |
          python .github/workflows/scripts/search_missing_https_links.py PORTFOLIO_WEBSITE.html
        continue-on-error: true

      # Check 5: Check for basic XSS vulnerabilities
      - name: XSS checks on HTML and JS files
        run: |
          python .github/workflows/scripts/check_xss.py .
        continue-on-error: true

      # Check 6: Python security - Bandit static scan
      - name: Run Bandit on all Python files
        run: |
          bandit -r . -f json -o security_bandit.json || exit 0

      # Check 7: Ensure .gitignore is protecting sensitive files
      - name: Check if .gitignore covers secrets
        run: |
          python .github/workflows/scripts/check_gitignore.py .gitignore
        continue-on-error: true

      # Check 8: Search for .env files checked in
      - name: Check for committed .env files
        run: |
          python .github/workflows/scripts/check_env_files.py .
        continue-on-error: true

      # Aggregate all security scan results
      - name: Generate security report
        run: |
          python .github/workflows/scripts/report_generator.py --security --bandit security_bandit.json --output security_report.json

      # Fail workflow on CRITICAL (and send alerts)
      - name: Handle security notifications and fail on CRITICAL
        id: notify
        run: |
          python .github/workflows/scripts/notify.py \
            --agent Security Agent \
            --report security_report.json \
            --on-critical-fail true \
            --on-high-email true \
            --on-warning-log true
        env:
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          SENDGRID_FROM_NAME: ${{ secrets.SENDGRID_FROM_NAME }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload report artifact
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security_report
          path: security_report.json

      - name: Upload Bandit results (if found)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: security_bandit
          path: security_bandit.json
        continue-on-error: true

      # Optionally post badge/readme update (handled in another step due to API permissions if needed)
