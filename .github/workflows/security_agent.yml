name: Security Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests bandit

      - name: Run security scan
        run: |
          echo "🔒 Genesis AI Systems Security Scan"
          echo "====================================="
          echo "Time: $(date)"
          echo "Commit: $GITHUB_SHA"
          echo ""
          echo "Scanning for exposed API keys..."
          grep -r "sk-" --include="*.py" --include="*.js" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            . && echo "⚠️ WARNING: Possible key found" || \
            echo "✅ No exposed keys found"
          echo ""
          echo "Running Bandit security scan..."
          bandit -r . -ll --exit-zero \
            --exclude ".git,node_modules,demo-server" || true
          echo ""
          echo "Checking HTTPS usage..."
          grep -r "http://" --include="*.html" --include="*.js" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            . && echo "⚠️ Non-HTTPS links found" || \
            echo "✅ All links use HTTPS"
          echo ""
          echo "✅ Security scan complete"

      - name: Verify site SSL
        run: |
          echo "Checking SSL certificate..."
          curl -s --max-time 15 \
            https://genesisai.systems > /dev/null && \
            echo "✅ SSL valid" || \
            echo "⚠️ SSL check failed"

      - name: Report complete
        run: |
          echo "✅ Security Agent complete"
          echo "Genesis AI Systems — genesisai.systems"
