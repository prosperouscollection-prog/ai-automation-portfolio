name: Security Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests bandit
      - name: Run security scan
        run: |
          echo "Security Agent — Genesis AI Systems"
          echo "Time: $(date)"
          grep -r "sk-" --include="*.py" --include="*.js" --exclude-dir=".git" --exclude-dir="node_modules" . && echo "Warning: possible key found" || echo "No exposed keys found"
          bandit -r . -ll --exit-zero --exclude ".git,node_modules,demo-server" || true
          grep -r "http://" --include="*.html" --include="*.js" --exclude-dir=".git" --exclude-dir="node_modules" . && echo "Warning: non-HTTPS links found" || echo "All links use HTTPS"
      - name: Verify site SSL
        run: curl -s --max-time 15 https://genesisai.systems > /dev/null && echo "SSL good" || echo "SSL check failed"
      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          msg = "🚨 Security Agent FAILED\nCheck GitHub Actions:\ngithub.com/prosperouscollection-prog/ai-automation-portfolio/actions"
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Telegram alert sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
