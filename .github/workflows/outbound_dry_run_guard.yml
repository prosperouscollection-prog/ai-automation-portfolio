name: Outbound Dry-Run Guard

on:
  workflow_dispatch:
    inputs:
      checked_by:
        description: Actor label for this verification run.
        required: false
        type: string
        default: ""
      correlation_id:
        description: Launch correlation id.
        required: false
        type: string
        default: ""
      state_file:
        description: Path to the launch-state JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_launch_state.json
      output_file:
        description: Path for the guard evidence JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_dry_run_guard_evidence.json
      require_dry_run:
        description: Require DRY_RUN to pass the guard.
        required: false
        type: boolean
        default: true
  # Future-only scheduled preflight. Keep disabled until the launch team approves it.
  # schedule:
  #   - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  dry-run-guard:
    name: Dry-Run Guard
    runs-on: ubuntu-latest
    env:
      OUTBOUND_LAUNCH_STATE_PATH: ${{ inputs.state_file }}
      OUTBOUND_CORRELATION_ID: ${{ inputs.correlation_id != '' && inputs.correlation_id || github.run_id }}
      OUTBOUND_GUARD_ACTOR: ${{ inputs.checked_by != '' && inputs.checked_by || github.actor }}
      OUTBOUND_OUTPUT_FILE: ${{ inputs.output_file }}
      OUTBOUND_REQUIRE_DRY_RUN: ${{ inputs.require_dry_run }}
      OUTBOUND_STDOUT_LOG: project9-sales-agent/state/outbound_dry_run_guard_stdout.log
      OUTBOUND_TELEGRAM_ALERT_CHANNEL: Telegram
      OUTBOUND_TELEGRAM_ALERT_FILE: project9-sales-agent/state/outbound_dry_run_guard_telegram_alert.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Dry-Run Guard
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            python3 project9-sales-agent/scripts/outbound_dry_run_guard.py
            --state-file "${OUTBOUND_LAUNCH_STATE_PATH}"
            --correlation-id "${OUTBOUND_CORRELATION_ID}"
            --checked-by "${OUTBOUND_GUARD_ACTOR}"
            --output "${OUTBOUND_OUTPUT_FILE}"
          )
          if [[ "${OUTBOUND_REQUIRE_DRY_RUN}" == "true" ]]; then
            CMD+=(--require-dry-run)
          fi

          "${CMD[@]}" | tee "${OUTBOUND_STDOUT_LOG}"

      - name: Prepare Telegram Alert Payload
        if: failure()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_path = Path(os.environ["OUTBOUND_OUTPUT_FILE"])
          alert_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          payload = {
              "alert_channel": os.environ.get("OUTBOUND_TELEGRAM_ALERT_CHANNEL", "Telegram"),
              "correlation_id": evidence.get("correlation_id", os.environ.get("OUTBOUND_CORRELATION_ID", "UNKNOWN")),
              "failure_reason": evidence.get("failure_reason", "unknown failure"),
              "next_action": evidence.get("next_action", "block_progression"),
              "run_id": os.environ.get("GITHUB_RUN_ID", "UNKNOWN"),
              "run_url": f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', 'UNKNOWN')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', 'UNKNOWN')}",
              "verdict": evidence.get("verification_result", "FAIL"),
              "workflow_file": ".github/workflows/outbound_dry_run_guard.yml",
              "workflow_name": "Outbound Dry-Run Guard",
          }
          alert_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Send Telegram Alert
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          from urllib import error, request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("Telegram delivery blocked: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID missing", file=sys.stderr)
              raise SystemExit(1)

          payload_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          payload = json.loads(payload_path.read_text(encoding="utf-8"))

          message = "\n".join([
              f"Workflow: {payload['workflow_name']}",
              f"Run ID: {payload['run_id']}",
              f"Run URL: {payload['run_url']}",
              f"Correlation ID: {payload['correlation_id']}",
              f"Verdict: {payload['verdict']}",
              f"Failure reason: {payload['failure_reason']}",
              f"Next action: {payload['next_action']}",
          ])

          body = json.dumps({
              "chat_id": chat_id,
              "text": message,
              "disable_web_page_preview": True,
          }).encode("utf-8")
          req = request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with request.urlopen(req, timeout=30) as resp:
                  response_body = resp.read().decode("utf-8", errors="replace")
                  print(response_body)
          except error.HTTPError as exc:
              print(f"Telegram delivery failed: HTTP {exc.code} {exc.reason}", file=sys.stderr)
              print(exc.read().decode("utf-8", errors="replace"), file=sys.stderr)
              raise SystemExit(1)
          except Exception as exc:
              print(f"Telegram delivery failed: {exc}", file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Write Step Summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_path = Path(os.environ["OUTBOUND_OUTPUT_FILE"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          stdout_log = Path(os.environ["OUTBOUND_STDOUT_LOG"])

          try:
              evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
              verdict = evidence.get("verification_result", "UNKNOWN")
              launch_mode = evidence.get("launch_mode_before", "UNKNOWN")
              launch_status = evidence.get("launch_status_before", "UNKNOWN")
              correlation_id = evidence.get("correlation_id", "UNKNOWN")
              next_action = evidence.get("next_action", "UNKNOWN")
              failure_reason = evidence.get("failure_reason")
              artifact_hint = evidence_path.as_posix()
          except Exception as exc:
              verdict = "FAIL"
              launch_mode = "UNKNOWN"
              launch_status = "UNKNOWN"
              correlation_id = os.environ.get("OUTBOUND_CORRELATION_ID", "UNKNOWN")
              next_action = "block_progression"
              failure_reason = f"summary parsing failed: {exc}"
              artifact_hint = evidence_path.as_posix()
          alert_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          alert_hint = alert_path.as_posix() if alert_path.exists() else "not-generated"

          lines = [
              "## Dry-Run Guard",
              f"- Verdict: `{verdict}`",
              f"- Launch mode before: `{launch_mode}`",
              f"- Launch status before: `{launch_status}`",
              f"- Correlation id: `{correlation_id}`",
              f"- Next action: `{next_action}`",
              f"- Evidence artifact: `{artifact_hint}`",
              f"- Telegram alert payload: `{alert_hint}`",
          ]
          if failure_reason:
              lines.append(f"- Failure reason: `{failure_reason}`")
          lines.append(f"- Stdout log: `{stdout_log.as_posix()}`")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_path.read_text(encoding="utf-8"), end="")
          PY

      - name: Upload Guard Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outbound-dry-run-guard-evidence
          path: |
            ${{ env.OUTBOUND_OUTPUT_FILE }}
            ${{ env.OUTBOUND_STDOUT_LOG }}
          if-no-files-found: error

      - name: Upload Telegram Alert Payload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: outbound-dry-run-guard-telegram-alert
          path: ${{ env.OUTBOUND_TELEGRAM_ALERT_FILE }}
          if-no-files-found: error
