name: Outbound Launch State Transition

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: Launch correlation id shared across the control chain.
        required: true
        type: string
      state_file:
        description: Path to the current launch-state JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_launch_state.json
      dry_run_evidence:
        description: Path to the dry-run guard evidence JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_dry_run_guard_evidence.json
      resume_evidence:
        description: Path to the resume gate evidence JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_resume_gate_evidence.json
      target_state:
        description: Requested next launch state.
        required: false
        type: choice
        default: PAUSED
        options:
          - PAUSED
          - LIVE_ALLOWED
      live_allowed_evidence:
        description: Path to the first-10 monitor evidence required for LIVE_ALLOWED.
        required: false
        type: string
        default: ""
      transition_record:
        description: Path for the transition record JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_launch_state_transition.json
      output_file:
        description: Path for the transition evidence JSON.
        required: false
        type: string
        default: project9-sales-agent/state/outbound_launch_state_transition_evidence.json
      checked_by:
        description: Actor label for this transition run.
        required: false
        type: string
        default: ""
  # Future-only scheduled control. Keep disabled until the launch team approves it.
  # schedule:
  #   - cron: "30 6 * * *"

permissions:
  contents: read
  actions: read

jobs:
  launch-state-transition:
    name: Launch-State Transition
    runs-on: ubuntu-latest
    env:
      OUTBOUND_LAUNCH_STATE_PATH: ${{ inputs.state_file }}
      OUTBOUND_DRY_RUN_EVIDENCE_PATH: ${{ inputs.dry_run_evidence }}
      OUTBOUND_RESUME_GUARD_EVIDENCE_PATH: ${{ inputs.resume_evidence }}
      OUTBOUND_LIVE_ALLOWED_EVIDENCE_PATH: ${{ inputs.live_allowed_evidence }}
      OUTBOUND_TARGET_STATE: ${{ inputs.target_state }}
      OUTBOUND_TRANSITION_RECORD_PATH: ${{ inputs.transition_record }}
      OUTBOUND_CORRELATION_ID: ${{ inputs.correlation_id }}
      OUTBOUND_GUARD_ACTOR: ${{ inputs.checked_by != '' && inputs.checked_by || github.actor }}
      OUTBOUND_OUTPUT_FILE: ${{ inputs.output_file }}
      OUTBOUND_DRY_RUN_EVIDENCE_ARTIFACT_NAME: outbound-dry-run-guard-evidence-${{ inputs.correlation_id }}
      OUTBOUND_RESUME_GUARD_EVIDENCE_ARTIFACT_NAME: outbound-resume-gate-evidence-${{ inputs.correlation_id }}
      OUTBOUND_EVIDENCE_ARTIFACT_NAME: outbound-launch-state-transition-evidence-${{ inputs.correlation_id }}
      OUTBOUND_TELEGRAM_ALERT_ARTIFACT_NAME: outbound-launch-state-transition-telegram-alert-${{ inputs.correlation_id }}
      OUTBOUND_STDOUT_LOG: project9-sales-agent/state/outbound_launch_state_transition_stdout.log
      OUTBOUND_TELEGRAM_ALERT_CHANNEL: Telegram
      OUTBOUND_TELEGRAM_ALERT_FILE: project9-sales-agent/state/outbound_launch_state_transition_telegram_alert.json
      OUTBOUND_STATE_ARTIFACT_NAME: outbound-launch-state-current
      OUTBOUND_STATE_RUNTIME_FILE: project9-sales-agent/state/outbound_launch_state_runtime.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Upstream Evidence
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import zipfile
          from io import BytesIO
          from pathlib import Path
          from urllib import error, request

          token = os.environ.get("GITHUB_TOKEN", "").strip()
          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          repository = os.environ.get("GITHUB_REPOSITORY", "").strip()
          correlation_id = os.environ.get("OUTBOUND_CORRELATION_ID", "").strip()
          if not token:
              print("Missing GITHUB_TOKEN for artifact handoff", file=sys.stderr)
              raise SystemExit(1)
          if not repository:
              print("Missing GITHUB_REPOSITORY for artifact handoff", file=sys.stderr)
              raise SystemExit(1)
          if not correlation_id:
              print("Missing OUTBOUND_CORRELATION_ID for artifact handoff", file=sys.stderr)
              raise SystemExit(1)

          evidence_specs = [
              (
                  Path(os.environ["OUTBOUND_DRY_RUN_EVIDENCE_PATH"]),
                  os.environ["OUTBOUND_DRY_RUN_EVIDENCE_ARTIFACT_NAME"],
                  "outbound_dry_run_guard_evidence.json",
              ),
              (
                  Path(os.environ["OUTBOUND_RESUME_GUARD_EVIDENCE_PATH"]),
                  os.environ["OUTBOUND_RESUME_GUARD_EVIDENCE_ARTIFACT_NAME"],
                  "outbound_resume_gate_evidence.json",
              ),
          ]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def api_json(url: str) -> dict:
              req = request.Request(url, headers=headers)
              with request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def api_bytes(url: str) -> bytes:
              req = request.Request(url, headers=headers)
              with request.urlopen(req, timeout=60) as resp:
                  return resp.read()

          artifacts = api_json(f"{api_url}/repos/{repository}/actions/artifacts?per_page=100").get("artifacts", [])

          for output_path, artifact_name, evidence_basename in evidence_specs:
              output_path.parent.mkdir(parents=True, exist_ok=True)
              matches = [
                  artifact for artifact in artifacts
                  if artifact.get("name") == artifact_name and not artifact.get("expired")
              ]
              if not matches:
                  raise SystemExit(
                      f"Missing upstream evidence artifact: {artifact_name} "
                      f"(correlation_id={correlation_id})"
                  )

              artifact = max(matches, key=lambda item: item.get("created_at", ""))
              archive_url = artifact.get("archive_download_url")
              if not archive_url:
                  raise SystemExit(f"Artifact archive URL missing for {artifact_name}")

              archive_bytes = api_bytes(archive_url)
              with zipfile.ZipFile(BytesIO(archive_bytes)) as zf:
                  members = zf.namelist()
                  candidate_names = [name for name in members if name.endswith(evidence_basename)]
                  if not candidate_names:
                      candidate_names = [name for name in members if name.endswith(".json")]
                  if not candidate_names:
                      raise SystemExit(
                          f"Downloaded artifact {artifact_name} did not contain a JSON evidence file"
                      )

                  member = candidate_names[0]
                  output_path.write_bytes(zf.read(member))

              print(
                  json.dumps(
                      {
                          "artifact_name": artifact_name,
                          "artifact_id": artifact.get("id"),
                          "downloaded_to": str(output_path),
                          "source_member": member,
                      },
                      indent=2,
                      sort_keys=True,
                  )
              )
          PY

      - name: Run Launch-State Transition
        id: transition
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            python3 project9-sales-agent/scripts/outbound_launch_state_transition.py
            --state-file "${OUTBOUND_LAUNCH_STATE_PATH}"
            --dry-run-evidence "${OUTBOUND_DRY_RUN_EVIDENCE_PATH}"
            --resume-evidence "${OUTBOUND_RESUME_GUARD_EVIDENCE_PATH}"
            --target-state "${OUTBOUND_TARGET_STATE}"
            --live-allowed-evidence "${OUTBOUND_LIVE_ALLOWED_EVIDENCE_PATH}"
            --transition-record "${OUTBOUND_TRANSITION_RECORD_PATH}"
            --correlation-id "${OUTBOUND_CORRELATION_ID}"
            --checked-by "${OUTBOUND_GUARD_ACTOR}"
            --output "${OUTBOUND_OUTPUT_FILE}"
          )

          "${CMD[@]}" | tee "${OUTBOUND_STDOUT_LOG}"

      - name: Upload Durable Launch State
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTBOUND_STATE_ARTIFACT_NAME }}
          path: ${{ env.OUTBOUND_LAUNCH_STATE_PATH }}
          if-no-files-found: error

      - name: Prepare Telegram Alert Payload
        if: failure()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_path = Path(os.environ["OUTBOUND_OUTPUT_FILE"])
          alert_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          payload = {
              "alert_channel": os.environ.get("OUTBOUND_TELEGRAM_ALERT_CHANNEL", "Telegram"),
              "correlation_id": evidence.get("correlation_id", os.environ.get("OUTBOUND_CORRELATION_ID", "UNKNOWN")),
              "failure_reason": evidence.get("failure_reason", "unknown failure"),
              "next_action": evidence.get("next_action", "block_progression"),
              "run_id": os.environ.get("GITHUB_RUN_ID", "UNKNOWN"),
              "run_url": f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', 'UNKNOWN')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', 'UNKNOWN')}",
              "verdict": evidence.get("transition_result", "FAIL"),
              "workflow_file": ".github/workflows/outbound_launch_state_transition.yml",
              "workflow_name": "Outbound Launch State Transition",
          }
          alert_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Send Telegram Alert
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          from urllib import error, request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("Telegram delivery blocked: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID missing", file=sys.stderr)
              raise SystemExit(1)

          payload_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          payload = json.loads(payload_path.read_text(encoding="utf-8"))

          message = "\n".join([
              f"Workflow: {payload['workflow_name']}",
              f"Run ID: {payload['run_id']}",
              f"Run URL: {payload['run_url']}",
              f"Correlation ID: {payload['correlation_id']}",
              f"Verdict: {payload['verdict']}",
              f"Failure reason: {payload['failure_reason']}",
              f"Next action: {payload['next_action']}",
          ])

          body = json.dumps({
              "chat_id": chat_id,
              "text": message,
              "disable_web_page_preview": True,
          }).encode("utf-8")
          req = request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with request.urlopen(req, timeout=30) as resp:
                  response_body = resp.read().decode("utf-8", errors="replace")
                  print(response_body)
          except error.HTTPError as exc:
              print(f"Telegram delivery failed: HTTP {exc.code} {exc.reason}", file=sys.stderr)
              print(exc.read().decode("utf-8", errors="replace"), file=sys.stderr)
              raise SystemExit(1)
          except Exception as exc:
              print(f"Telegram delivery failed: {exc}", file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Write Step Summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_path = Path(os.environ["OUTBOUND_OUTPUT_FILE"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          stdout_log = Path(os.environ["OUTBOUND_STDOUT_LOG"])

          try:
              evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
              verdict = evidence.get("transition_result", "UNKNOWN")
              source_state = evidence.get("source_state_before", "UNKNOWN")
              target_state = evidence.get("target_state_requested", "UNKNOWN")
              correlation_id = evidence.get("correlation_id", "UNKNOWN")
              next_action = evidence.get("next_action", "UNKNOWN")
              failure_reason = evidence.get("failure_reason")
              artifact_hint = evidence_path.as_posix()
          except Exception as exc:
              verdict = "FAIL"
              source_state = "UNKNOWN"
              target_state = os.environ.get("OUTBOUND_TARGET_STATE", "UNKNOWN")
              correlation_id = os.environ.get("OUTBOUND_CORRELATION_ID", "UNKNOWN")
              next_action = "block_progression"
              failure_reason = f"summary parsing failed: {exc}"
              artifact_hint = evidence_path.as_posix()
          alert_path = Path(os.environ["OUTBOUND_TELEGRAM_ALERT_FILE"])
          alert_hint = alert_path.as_posix() if alert_path.exists() else "not-generated"

          lines = [
              "## Launch-State Transition",
              f"- Verdict: `{verdict}`",
              f"- Source state before: `{source_state}`",
              f"- Target state requested: `{target_state}`",
              f"- Correlation id: `{correlation_id}`",
              f"- Next action: `{next_action}`",
              f"- Evidence artifact: `{artifact_hint}`",
              f"- Evidence artifact name: `{os.environ.get('OUTBOUND_EVIDENCE_ARTIFACT_NAME', 'unknown')}`",
              f"- Durable state artifact: `{os.environ.get('OUTBOUND_STATE_ARTIFACT_NAME', 'unknown')}`",
              f"- Telegram alert payload: `{alert_hint}`",
              f"- Telegram alert artifact name: `{os.environ.get('OUTBOUND_TELEGRAM_ALERT_ARTIFACT_NAME', 'unknown')}`",
          ]
          if failure_reason:
              lines.append(f"- Failure reason: `{failure_reason}`")
          lines.append(f"- Stdout log: `{stdout_log.as_posix()}`")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_path.read_text(encoding="utf-8"), end="")
          PY

      - name: Upload Transition Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTBOUND_EVIDENCE_ARTIFACT_NAME }}
          path: |
            ${{ env.OUTBOUND_OUTPUT_FILE }}
            ${{ env.OUTBOUND_STDOUT_LOG }}
          if-no-files-found: error

      - name: Upload Telegram Alert Payload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTBOUND_TELEGRAM_ALERT_ARTIFACT_NAME }}
          path: ${{ env.OUTBOUND_TELEGRAM_ALERT_FILE }}
          if-no-files-found: error
