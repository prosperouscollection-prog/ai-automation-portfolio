# Genesis AI Systems QA Agent Workflow
# Monitors https://genesisai.systems for functionality, links, accessibility, branding, and compliance
# Owner: Trendell Fordham — info@genesisai.systems, (313) 400-2575
# https://genesisai.systems

name: "QA Agent"

on:
  schedule:
    - cron: '0 * * * *'         # Every hour
  workflow_dispatch:            # Manual trigger
  push:
    branches:
      - main                   # On push to main branch
  workflow_run:
    workflows: ["Security Agent"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  id-token: write
  checks: write

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  CALENDLY_URL: ${{ secrets.CALENDLY_URL }}
  NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
  ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  DEMO_SERVER_URL: ${{ secrets.DEMO_SERVER_URL }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BRAND_OWNER: "Trendell Fordham"
  BRAND_NAME: "Genesis AI Systems"
  BRAND_CONTACT: "info@genesisai.systems"
  BRAND_WEBSITE: "https://genesisai.systems"

jobs:
  qa:
    name: "Run QA/CX test suite"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: "Set up Node.js for Playwright"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Install Playwright & browsers"
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/scripts/requirements.txt
          npx playwright install --with-deps

      - name: "Run QA Agent tests"
        id: qa-check
        run: |
          python .github/workflows/scripts/qa_agent.py
        env:
          SITE_URL: ${{ env.SITE_URL }}
          CALENDLY_URL: ${{ env.CALENDLY_URL }}
          NOTIFICATION_EMAIL: ${{ env.NOTIFICATION_EMAIL }}
          ALERT_PHONE_NUMBER: ${{ env.ALERT_PHONE_NUMBER }}
          DEMO_SERVER_URL: ${{ env.DEMO_SERVER_URL }}

      - name: "Upload QA Report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa_report.json
          path: .github/workflows/scripts/qa_report.json

      - name: "Announce failure (SMS, Email, GitHub Issue)"
        if: failure()
        run: |
          python .github/workflows/scripts/notify.py \
            --subject "QA FAILED: ${{ steps.qa-check.outcome }}" \
            --message "See qa_report.json for detailed failures.\nQA Agent found issues during scheduled check. Visit https://genesisai.systems and GitHub Actions for immediate attention. Failing agent blocks deploy." \
            --priority CRITICAL \
            --agent QA
          python .github/workflows/scripts/report_generator.py --qa-fail-github-issue .github/workflows/scripts/qa_report.json

      - name: "Block Deploy Agent on QA failure"
        if: failure()
        run: |
          echo "::error title=QA Agent failed::QA Agent must pass before deployment."
          exit 1

      - name: "Create QA README badge (passing)"
        if: success()
        uses: RubbaBoy/BYOBadges@v2
        with:
          label: QA
          status: passing
          color: "2563eb"
          path: qa-badge-passing.svg

      - name: "Create QA README badge (failed)"
        if: failure()
        uses: RubbaBoy/BYOBadges@v2
        with:
          label: QA
          status: failed
          color: "cb2431"
          path: qa-badge-failed.svg
