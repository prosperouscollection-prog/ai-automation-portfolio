name: QA Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check main site is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesisai.systems || echo "000")
          echo "Site: $STATUS"
          test "$STATUS" = "200"
      - name: Check demo server is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesis-ai-systems-demo.onrender.com || echo "000")
          echo "Demo: $STATUS"
      - name: Check key pages
        run: |
          test -f index.html
          test -f demos.html
          test -f about.html
          test -f command.html
      - name: Check live stats path
        run: curl -s --max-time 30 https://genesis-ai-systems-demo.onrender.com/stats/health || true
      - name: SMS alert on failure
        if: failure()
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        run: |
          pip install twilio -q
          python3 - << 'PYEOF'
          import os
          from twilio.rest import Client
          try:
              client = Client(
                  os.getenv('TWILIO_ACCOUNT_SID'),
                  os.getenv('TWILIO_AUTH_TOKEN')
              )
              client.messages.create(
                  body=(
                      "🚨 Genesis AI Systems Alert\n"
                      "An agent just FAILED.\n"
                      "Check GitHub Actions:\n"
                      "github.com/prosperouscollection-prog/"
                      "ai-automation-portfolio/actions"
                  ),
                  from_=os.getenv('TWILIO_FROM_NUMBER'),
                  to=os.getenv('ALERT_PHONE_NUMBER')
              )
              print('✅ Failure SMS sent')
          except Exception as e:
              print(f'SMS failed: {e}')
          PYEOF
