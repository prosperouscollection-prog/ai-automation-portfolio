name: QA Agent - Genesis AI Systems
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check main site is live and fast
        run: |
          STATUS=$(curl -s -o /tmp/home.html -w "%{http_code}" --max-time 30 https://genesisai.systems || echo "000")
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 30 https://genesisai.systems || echo "99")
          echo "Home status: $STATUS"
          echo "Home load time: $TIME"
          test "$STATUS" = "200"
          awk "BEGIN {exit !($TIME < 3)}"

      - name: Check key pages return 200
        run: |
          for URL in \
            https://genesisai.systems/about.html \
            https://genesisai.systems/demos.html \
            https://genesisai.systems/sitemap.xml \
            https://genesisai.systems/robots.txt
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "$URL -> $STATUS"
            test "$STATUS" = "200"
          done

      - name: Check homepage CRO sections and form
        run: |
          PAGE=$(curl -sL --max-time 30 https://genesisai.systems)
          echo "checking: id=\"contactForm\""
          echo "$PAGE" | grep -q 'id="contactForm"'
          echo "checking: Most businesses start with one clear fix"
          echo "$PAGE" | grep -q 'Most businesses start with one clear fix'
          echo "checking: Why owners feel safe starting here"
          echo "$PAGE" | grep -q 'Why owners feel safe starting here'
          echo "checking: What you see after launch"
          echo "$PAGE" | grep -q 'What you see after launch'
          echo "checking: Tell Trendell what is slowing the business down"
          echo "$PAGE" | grep -q 'Tell Trendell what is slowing the business down'

      - name: Check homepage avoids broken trust and fake-live copy
        run: |
          PAGE=$(curl -sL --max-time 30 https://genesisai.systems)
          ! echo "$PAGE" | grep -q 'Placeholder testimonial'
          ! echo "$PAGE" | grep -q '\[Client Name\]'
          ! echo "$PAGE" | grep -q 'Your AI is already working'
          ! echo "$PAGE" | grep -q 'GA_MEASUREMENT_ID'

      - name: Check industry tabs, skip link, and logo assets
        run: |
          PAGE=$(curl -sL --max-time 30 https://genesisai.systems)
          SHELL=$(curl -sL --max-time 30 https://genesisai.systems/assets/site.js)
          STYLES=$(curl -sL --max-time 30 https://genesisai.systems/assets/site.css)
          echo "$PAGE" | grep -q 'data-tab-group="industry"'
          echo "$SHELL" | grep -q 'Skip to main content'
          echo "$SHELL" | grep -q 'genesis-logo'
          echo "$STYLES" | grep -q '\.skip-link'
          curl -sL --max-time 30 https://genesisai.systems/favicon.svg | grep -q '<svg'

      - name: Check public nav and footer links
        run: |
          SHELL=$(curl -sL --max-time 30 https://genesisai.systems/assets/site.js)
          echo "$SHELL" | grep -q 'How It Works'
          echo "$SHELL" | grep -q 'Real Examples'
          echo "$SHELL" | grep -q 'About'
          echo "$SHELL" | grep -q 'Demos'
          echo "$SHELL" | grep -q 'Pricing'
          echo "$SHELL" | grep -q 'Contact'
          echo "$SHELL" | grep -q 'Privacy Policy'
          echo "$SHELL" | grep -q 'Terms of Service'
          echo "$SHELL" | grep -q 'Command Center'

      - name: Check shared config and homepage data files
        run: |
          CONFIG=$(curl -sL --max-time 30 https://genesisai.systems/assets/site-config.js)
          HOME=$(curl -sL --max-time 30 https://genesisai.systems/assets/homepage-data.js)
          echo "$CONFIG" | grep -q 'calendly.com'
          echo "$CONFIG" | grep -q 'buy.stripe.com'
          echo "$HOME" | grep -q 'featuredOffers'
          echo "$HOME" | grep -q 'pricingCards'

      - name: Check demos and about pages avoid placeholder trust
        run: |
          ABOUT=$(curl -sL --max-time 30 https://genesisai.systems/about.html)
          DEMOS=$(curl -sL --max-time 30 https://genesisai.systems/demos.html)
          ! echo "$ABOUT" | grep -q 'Placeholder testimonial'
          ! echo "$ABOUT" | grep -q '\[Client Name\]'
          echo "$DEMOS" | grep -q 'buy.stripe.com'
          echo "$DEMOS" | grep -q 'Reserve'

      - name: Check demo server is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesis-ai-systems-demo.onrender.com || echo "000")
          echo "Demo server status: $STATUS"
          test "$STATUS" = "200"

      - name: Check local files exist
        run: |
          test -f index.html
          test -f about.html
          test -f demos.html
          test -f assets/site.css
          test -f assets/site.js
          test -f assets/site-config.js
          test -f assets/homepage-data.js
          test -f assets/homepage.js
          test -f favicon.svg
          test -f manifest.json
          test -f sitemap.xml
          test -f robots.txt

      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          msg = "🚨 QA Agent FAILED\nA site check failed.\nCheck GitHub Actions:\ngithub.com/prosperouscollection-prog/ai-automation-portfolio/actions"
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Telegram alert sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
