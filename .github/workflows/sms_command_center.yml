name: SMS Command Center — Genesis AI Systems
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'SMS command from Trendell'
        required: true
      from_number:
        description: 'Sender phone number'
        required: true

jobs:
  process-command:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install twilio requests python-dotenv
      - name: Process SMS command
        env:
          COMMAND: ${{ github.event.inputs.command }}
          FROM_NUMBER: ${{ github.event.inputs.from_number }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          DEMO_SERVER_URL: ${{ secrets.DEMO_SERVER_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd .github/workflows/scripts
          python3 sms_command_center.py
