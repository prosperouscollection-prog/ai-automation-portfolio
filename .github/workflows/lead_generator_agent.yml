name: Lead Generator Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  lead-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run lead generator
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests twilio python-dotenv google-auth google-api-python-client -q
          cd .github/workflows/scripts
          python3 lead_generator_agent.py
      - name: SMS on failure
        if: failure()
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        run: |
          pip install twilio -q
          python3 - << 'PYEOF'
          import os
          if os.getenv('TWILIO_ACCOUNT_SID') and os.getenv('TWILIO_AUTH_TOKEN'):
              from twilio.rest import Client
              try:
                  Client(
                      os.getenv('TWILIO_ACCOUNT_SID'),
                      os.getenv('TWILIO_AUTH_TOKEN')
                  ).messages.create(
                      body="🚨 Lead Generator FAILED\nCheck GitHub Actions",
                      from_=os.getenv('TWILIO_FROM_NUMBER'),
                      to=os.getenv('ALERT_PHONE_NUMBER')
                  )
              except Exception:
                  pass
          PYEOF
