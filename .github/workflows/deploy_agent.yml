name: "🚀 Deploy Agent — Genesis AI Systems"
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages propagation
        run: |
          echo "🚀 Deploy Agent — Genesis AI Systems"
          echo "====================================="
          echo "Commit: $GITHUB_SHA"
          echo "Time: $(date)"
          echo "Waiting 45 seconds for GitHub Pages..."
          sleep 45

      - name: Verify main site
        run: |
          echo "Verifying genesisai.systems..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 https://genesisai.systems \
            || echo "000")
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment verified successfully"
          else
            echo "⚠️ Site returned $STATUS — may still propagating"
          fi

      - name: Verify demos page
        run: |
          echo "Verifying demos page..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://genesisai.systems/demos.html \
            || echo "000")
          echo "Demos page status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Demos page live"
          else
            echo "⚠️ Demos page status: $STATUS"
          fi

      - name: Log deployment record
        run: |
          echo "{"  > deployment.json
          echo "  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," \
            >> deployment.json
          echo "  \"commit\": \"$GITHUB_SHA\"," \
            >> deployment.json
          echo "  \"status\": \"deployed\"," \
            >> deployment.json
          echo "  \"site\": \"https://genesisai.systems\"," \
            >> deployment.json
          echo "  \"business\": \"Genesis AI Systems\"" \
            >> deployment.json
          echo "}" >> deployment.json
          cat deployment.json

      - name: Report complete
        run: |
          echo "✅ Deploy Agent complete"
          echo "Live at: https://genesisai.systems"
          echo "Demos: https://genesisai.systems/demos.html"
          echo "Genesis AI Systems — Trendell Fordham"
