name: Deploy Agent — Genesis AI Systems
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for site to update
        run: sleep 45
      - name: Verify main site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesisai.systems || echo "000")
          echo "Main site status: $STATUS"
      - name: Verify demos page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://genesisai.systems/demos.html || echo "000")
          echo "Demos page status: $STATUS"
      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          msg = "🚨 Deploy Agent FAILED\nCheck GitHub Actions:\ngithub.com/prosperouscollection-prog/ai-automation-portfolio/actions"
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Telegram alert sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
