# Genesis AI Systems — Deploy Agent Workflow
# ------------------------------------------
# Author: Trendell Fordham (https://genesisai.systems)
# Description: Deploys website after QA/Security pass, validates deployment, logs & notifies.
#
# Triggers:
#  - After QA pass on push to main
#  - Manual (workflow_dispatch)
#
name: "🚀 Deploy Agent — Genesis AI Systems"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check_status:
    name: "Verify Security & QA"
    runs-on: ubuntu-latest
    outputs:
      security_status: ${{ steps.check.outputs.security_status }}
      qa_status: ${{ steps.check.outputs.qa_status }}
    steps:
      - name: "Download Security & QA Status Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: security_report
          path: security_results
      - name: "Download QA Report"
        uses: actions/download-artifact@v4
        with:
          name: qa_report
          path: qa_results
      - name: "Check Security & QA Pass"
        id: check
        run: |
          SECURITY_PASSED="false"
          QA_PASSED="false"
          if [[ -f security_results/security_report.json ]]; then
            if jq -e '.status == "PASS"' security_results/security_report.json > /dev/null; then
              SECURITY_PASSED="true"
            fi
          fi
          if [[ -f qa_results/qa_report.json ]]; then
            if jq -e '.status == "PASS"' qa_results/qa_report.json > /dev/null; then
              QA_PASSED="true"
            fi
          fi
          echo "Security Agent: $SECURITY_PASSED"
          echo "QA Agent: $QA_PASSED"
          echo "security_status=$SECURITY_PASSED" >> $GITHUB_OUTPUT
          echo "qa_status=$QA_PASSED" >> $GITHUB_OUTPUT
      - name: "Fail if Security/QA did not pass"
        if: steps.check.outputs.security_status != 'true' || steps.check.outputs.qa_status != 'true'
        run: |
          echo "::error title=Blocking Deploy:: Security or QA agent did not pass."
          exit 1

  create_deploy_record:
    name: "Create Deployment Record"
    needs: check_status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "Install Requirements"
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/scripts/requirements.txt
      - name: "Create Deployment Record"
        run: |
          mkdir -p deployments
          python .github/workflows/scripts/report_generator.py --log-deployment deployments/deployments.json
      - name: Upload deployments.json
        uses: actions/upload-artifact@v4
        with:
          name: deployments
          path: deployments/deployments.json

  deploy_gh_pages:
    name: "Deploy to GitHub Pages"
    needs: create_deploy_record
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Wait for CDN to propagate
        run: sleep 60

  post_deploy_validation:
    name: "Post-Deploy QA Checks"
    needs: deploy_gh_pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r .github/workflows/scripts/requirements.txt
      - name: Run post-deploy validation
        id: postqa
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CALENDLY_URL: ${{ secrets.CALENDLY_URL }}
        run: |
          python .github/workflows/scripts/report_generator.py --post-deploy-qa --site-url "$SITE_URL" --calendly-url "$CALENDLY_URL" --output post_deploy_qa_report.json
      - name: Upload post-deploy QA report
        uses: actions/upload-artifact@v4
        with:
          name: post_deploy_qa_report
          path: post_deploy_qa_report.json

  notify_and_log:
    name: "Notify & Log Results"
    needs: post_deploy_validation
    runs-on: ubuntu-latest
    env:
      ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SITE_URL: ${{ secrets.SITE_URL }}
      CALENDLY_URL: ${{ secrets.CALENDLY_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requirements
        run: |
          pip install -r .github/workflows/scripts/requirements.txt
      - name: Download post-deploy QA report
        uses: actions/download-artifact@v4
        with:
          name: post_deploy_qa_report
      - name: Summarize deploy and notify
        id: notify
        run: |
          python .github/workflows/scripts/notify.py --notify-deploy --qa-report post_deploy_qa_report.json
      - name: Update deployments.json
        run: |
          python .github/workflows/scripts/report_generator.py --finalize-deployment deployments/deployments.json post_deploy_qa_report.json
      - name: Upload updated deployments.json
        uses: actions/upload-artifact@v4
        with:
          name: deployments
          path: deployments/deployments.json

  summarize:
    name: "Summarize & Badges"
    needs: notify_and_log
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update deployment badge
        run: |
          echo "Deployment succeeded! Badge auto-updated by GitHub."
