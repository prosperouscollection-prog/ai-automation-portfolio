name: Scraper Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      target_city:
        description: 'City to scrape (default: Detroit)'
        default: 'Detroit MI'
      industry:
        description: 'Industry to scrape'
        default: 'restaurant'
      max_results:
        description: 'Max results to scrape'
        default: '50'

jobs:
  scrape-prospects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_CITY: ${{ github.event.inputs.target_city || 'Detroit MI' }}
          INDUSTRY: ${{ github.event.inputs.industry || 'restaurant' }}
          MAX_RESULTS: ${{ github.event.inputs.max_results || '50' }}
        run: |
          pip install requests twilio python-dotenv beautifulsoup4 playwright lxml google-api-python-client google-auth -q
          playwright install chromium
          cd .github/workflows/scripts
          python3 scraper_agent.py
      - name: SMS on failure
        if: failure()
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        run: |
          pip install twilio -q
          python3 - << 'PYEOF'
          import os
          if os.getenv('TWILIO_ACCOUNT_SID') and os.getenv('TWILIO_AUTH_TOKEN'):
              from twilio.rest import Client
              try:
                  Client(
                      os.getenv('TWILIO_ACCOUNT_SID'),
                      os.getenv('TWILIO_AUTH_TOKEN')
                  ).messages.create(
                      body="🚨 Scraper Agent FAILED\nCheck GitHub Actions",
                      from_=os.getenv('TWILIO_FROM_NUMBER'),
                      to=os.getenv('ALERT_PHONE_NUMBER')
                  )
              except Exception:
                  pass
          PYEOF
              pass
          PYEOF
