name: Scraper Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      target_city:
        description: 'City to scrape (default: Detroit)'
        default: 'Detroit MI'
      industry:
        description: 'Industry to scrape'
        default: 'restaurant'
      max_results:
        description: 'Max results to scrape'
        default: '50'

jobs:
  scrape-prospects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_CITY: ${{ github.event.inputs.target_city || 'Detroit MI' }}
          INDUSTRY: ${{ github.event.inputs.industry || 'restaurant' }}
          MAX_RESULTS: ${{ github.event.inputs.max_results || '50' }}
        run: |
          pip install requests python-dotenv beautifulsoup4 playwright lxml google-api-python-client google-auth -q
          playwright install chromium
          cd .github/workflows/scripts
          python3 scraper_agent.py
      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          msg = "🚨 Scraper Agent FAILED\nCheck GitHub Actions:\ngithub.com/prosperouscollection-prog/ai-automation-portfolio/actions"
          if token and chat:
              try:
                  r = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg}, timeout=10)
                  print('✅ Telegram alert sent' if r.ok else f'⚠️ Telegram {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Telegram failed: {e}')
          PYEOF
