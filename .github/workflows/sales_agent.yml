name: Sales Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sales-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run sales pipeline
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          LINDY_API_KEY: ${{ secrets.LINDY_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEMO_SERVER_URL: ${{ secrets.DEMO_SERVER_URL }}
        run: |
          pip install requests twilio python-dotenv -q
          cd .github/workflows/scripts
          python3 sales_agent.py
      - name: SMS alert on failure
        if: failure()
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
        run: |
          pip install twilio -q
          python3 - << 'PYEOF'
          import os
          if os.getenv('TWILIO_ACCOUNT_SID') and os.getenv('TWILIO_AUTH_TOKEN'):
              from twilio.rest import Client
              try:
                  Client(
                      os.getenv('TWILIO_ACCOUNT_SID'),
                      os.getenv('TWILIO_AUTH_TOKEN')
                  ).messages.create(
                      body="🚨 Sales Agent FAILED\nCheck GitHub Actions",
                      from_=os.getenv('TWILIO_FROM_NUMBER'),
                      to=os.getenv('ALERT_PHONE_NUMBER')
                  )
              except Exception:
                  pass
          PYEOF
