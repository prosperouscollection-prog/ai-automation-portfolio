name: Evolution Agent — Genesis AI Systems
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  evolution-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check copyright year
        run: |
          echo "🔄 Genesis AI Systems Evolution Check"
          echo "======================================"
          echo "Time: $(date)"
          echo ""
          echo "Checking copyright year..."
          grep -r "2025" --include="*.html" \
            --exclude-dir=".git" . && \
            echo "⚠️ Outdated year found — update to 2026" || \
            echo "✅ Copyright year current"

      - name: Check for outdated models
        run: |
          echo "Checking for deprecated model names..."
          grep -r "gpt-3.5\\|text-davinci" \
            --include="*.py" --include="*.js" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            . && echo "⚠️ Outdated models found" || \
            echo "✅ No deprecated models found"

      - name: Check demo server health
        run: |
          echo "Checking demo server..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://genesis-ai-systems-demo.onrender.com \
            || echo "000")
          echo "Demo server status: $STATUS"
          if [ "$STATUS" = "200" ] || \
             [ "$STATUS" = "404" ] || \
             [ "$STATUS" = "301" ]; then
            echo "✅ Demo server responding"
          else
            echo "⚠️ Demo server may be down: $STATUS"
          fi

      - name: Generate evolution report
        run: |
          echo "Evolution report generated: $(date)"
          echo "Repository: ai-automation-portfolio"
          echo "Business: Genesis AI Systems"
          echo "Website: genesisai.systems"
          echo "✅ Evolution Agent complete"
