name: "Evolution Agent"

on:
  schedule:
    - cron: '0 2 * * *'   # Every day at 2am Detroit/EST
  workflow_dispatch:

jobs:
  evolution:
    name: "Evolution & AI Changelog Scan"
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DEMO_SERVER_URL: ${{ secrets.DEMO_SERVER_URL }}
      SITE_URL: ${{ secrets.SITE_URL }}
      CALENDLY_URL: ${{ secrets.CALENDLY_URL }}
      ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Genesis AI Systems Branding
        run: |
          echo "\e[34mGenesis AI Systems | Evolution Agent\e[0m"
          echo "Founder: Trendell Fordham — https://genesisai.systems"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (agent only)
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/scripts/requirements.txt

      - name: Check for outdated dependencies
        id: pip-deps
        run: |
          pip list --outdated --format=json > pip_outdated.json || echo '[]' > pip_outdated.json

      - name: Check CDN library versions in website
        id: cdn-check
        run: |
          python .github/workflows/scripts/report_generator.py --check-cdn --site-url="$SITE_URL" --out=cdn_versions.json

      - name: Check OpenAI changelog for breaking changes
        id: openai-changelog
        run: |
          python .github/workflows/scripts/report_generator.py --openai-changelog --out=openai_changelog.json

      - name: Check Anthropic changelog
        id: anthropic-changelog
        run: |
          python .github/workflows/scripts/report_generator.py --anthropic-changelog --out=anthropic_changelog.json

      - name: Scan for deprecated model names
        id: deprecated-models
        run: |
          python .github/workflows/scripts/report_generator.py --check-models --out=deprecated_models.json

      - name: Check copyright year is 2026
        id: copyright-year
        run: |
          python .github/workflows/scripts/report_generator.py --check-copyright-year 2026 --out=copyright_year.json

      - name: Suggest Claude API improvements
        id: claude-suggestions
        run: |
          python .github/workflows/scripts/report_generator.py --claude-suggestions --out=claude_suggestions.json

      - name: Test demo server performance
        id: demo-perf
        run: |
          python .github/workflows/scripts/report_generator.py --demo-perf --demo-url="$DEMO_SERVER_URL" --out=demo_perf.json

      - name: Suggest new AI capabilities
        id: ai-suggestions
        run: |
          python .github/workflows/scripts/report_generator.py --ai-suggestions --out=ai_capabilities.json

      - name: Aggregate Evolution Report
        id: aggregate-report
        run: |
          python .github/workflows/scripts/report_generator.py \
            --aggregate-evolution \
            --pip-outdated pip_outdated.json \
            --cdn cdn_versions.json \
            --openai openai_changelog.json \
            --anthropic anthropic_changelog.json \
            --deprecated-models deprecated_models.json \
            --copyright copyright_year.json \
            --claude claude_suggestions.json \
            --demo-perf demo_perf.json \
            --ai-suggestions ai_capabilities.json \
            --out evolution_report.json

      - name: Upload artifact: evolution_report.json
        uses: actions/upload-artifact@v4
        with:
          name: evolution_report
          path: evolution_report.json

      - name: Create GitHub issues for critical findings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/workflows/scripts/report_generator.py --create-issues --report evolution_report.json

      - name: Brand Evolution Report footer
        if: always()
        run: |
          echo '{"powered_by": "Genesis AI Systems", "website": "https://genesisai.systems", "contact": "info@genesisai.systems"}' >> evolution_report.json

      - name: Output key Evolution findings
        run: |
          echo "EVOLUTION AGENT COMPLETE: Evolution report generated."
          cat evolution_report.json
