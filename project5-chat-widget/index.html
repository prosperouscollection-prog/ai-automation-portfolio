<!DOCTYPE html>
<html lang="en">
<!--
  ============================================
  PROJECT 5: AI Customer Service Chat Widget
  ============================================
  Author: [Your Name]
  Description: Embeddable AI chat widget for local business websites.
  Use case: 24/7 customer support and lead capture for service businesses.
  Offer: Setup Fee $2,500 | Monthly Retainer $500/month

  TO DEPLOY:
  1. Replace CONFIG.apiEndpoint with your secure backend proxy URL
  2. Customize CONFIG.businessName, hours, phone, services
  3. Embed the widget into any website
  ============================================
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Customer Service Chat Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .widget {
      width: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header-text h3 { font-size: 16px; }
    .header-text p { font-size: 12px; opacity: 0.8; }
    .chat-box {
      height: 350px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bot {
      background: #f0f2f5;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .typing {
      background: #f0f2f5;
      color: #666;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }
    .input-area {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      outline: none;
      font-size: 14px;
    }
    input:focus { border-color: #2563eb; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button:hover { background: #1d4ed8; }
    .powered {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 8px;
      border-top: 1px solid #f0f2f5;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="avatar">🤖</div>
      <div class="header-text">
        <h3 id="widgetTitle">Smile Dental Assistant</h3>
        <p>Online • Typically replies instantly</p>
      </div>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        👋 Hi! I'm your Smile Dental assistant. How can I help you today?
      </div>
    </div>
    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your question..."
        onkeypress="if(event.key==='Enter') sendMessage()"
      />
      <button onclick="sendMessage()">➤</button>
    </div>
    <div class="powered">Powered by AI • Built by [Your Name]</div>
  </div>

  <script>
    // ============================================
    // CONFIGURATION — Edit this section only
    // ============================================
    const CONFIG = {
      apiEndpoint: 'https://your-backend-proxy.example.com/chat',
      businessName: 'Smile Dental',
      phone: '(555) 123-4567',
      hours: 'Mon-Fri 8am-6pm, Sat 9am-2pm',
      services: 'cleanings, whitening, fillings, extractions, Invisalign',
      model: 'gpt-4o-mini',
      maxTokens: 200
    };

    document.getElementById('widgetTitle').textContent = `${CONFIG.businessName} Assistant`;

    // ============================================
    // CHAT ENGINE — No edits needed below
    // ============================================
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chatBox = document.getElementById('chatBox');
      const message = input.value.trim();
      if (!message) return;

      // Render user message
      chatBox.innerHTML += `<div class="message user">${message}</div>`;
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Show typing indicator
      chatBox.innerHTML += `<div class="message typing" id="typing">Assistant is typing...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        if (!CONFIG.apiEndpoint || CONFIG.apiEndpoint.includes('your-backend-proxy.example.com')) {
          throw new Error('Missing backend proxy configuration');
        }

        const response = await fetch(CONFIG.apiEndpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: CONFIG.model,
            messages: [
              {
                role: 'system',
                content: `You are a helpful customer service assistant for ${CONFIG.businessName}.
                Keep answers short and friendly.
                Office hours: ${CONFIG.hours}.
                Phone: ${CONFIG.phone}.
                Services: ${CONFIG.services}.
                Always end with: Is there anything else I can help you with?`
              },
              { role: 'user', content: message }
            ],
            max_tokens: CONFIG.maxTokens
          })
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        const reply = data.reply || data.choices?.[0]?.message?.content;

        if (!reply) {
          throw new Error('No reply returned from API');
        }

        document.getElementById('typing').remove();
        chatBox.innerHTML += `<div class="message bot">${reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (error) {
        document.getElementById('typing').remove();
        chatBox.innerHTML += `<div class="message bot">Sorry, I'm having trouble connecting right now. Please call us at ${CONFIG.phone} and we'll be happy to help.</div>`;
      }
    }
  </script>
</body>
</html>
