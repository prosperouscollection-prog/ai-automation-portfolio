      --max: 1180px;

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    }

    img { max-width: 100%; display: block; }
    .container {

      margin: 0 auto;

    .nav-wrap {
      position: sticky;

    .brand {

      border: 1px solid transparent;
      cursor: pointer;
    }
    .button:focus {

      outline-offset: 3px;
    }
    .button:hover { transform: translateY(-1px); }
    .button-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      box-shadow: 0 18px 45px rgba(37, 99, 235, 0.35);
      color: #fff;
    }
    .button-secondary {

      border-color: rgba(255, 255, 255, 0.14);
      color: var(--text);
    }
    /* PWA Install Banner Styles */
    #pwa-install-banner {

      left: 0;
      right: 0;
      bottom: 0;

      display: none;
      background: linear-gradient(90deg, #0f172a 65%, #2563eb 200%);
      color: #fff;
      box-shadow: 0 -2px 24px rgba(15,23,42,.14);
      padding: .85em 1.12em .85em 1.12em;
      border-radius: 18px 18px 0 0;
      font-size: 1.09em;
      align-items: center;
      justify-content: space-between;
      gap: 1.1em;
      animation: fadeIn 0.21s cubic-bezier(.32,1.56,.64,1);
    }
    #pwa-install-banner-content {

      align-items: center;
      gap: 0.7em;
    }
    #pwa-install-banner .pwa-icon {
      width: 36px;
      height: 36px;
      display: inline-block;
      background: url('/icons/icon-192.png') center center / cover no-repeat;
      border-radius: 12px;
      border: 1.5px solid #2563eb99;

    #pwa-install-banner button {

  <!-- PWA Install Banner: only on mobile, initialized by JS-->
  <div id="pwa-install-banner" role="region" aria-label="Install Genesis AI Systems App" style="display:none;">
    <div id="pwa-install-banner-content">

  </div>

  <script>
    // Smooth scrolling
    document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
      anchor.addEventListener('click', (event) => {
        const targetId = anchor.getAttribute('href');
        if (!targetId || targetId === '#') { return; }
        const target = document.querySelector(targetId);
        if (!target) { return; }
        event.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // ... (ALL LIVE DEMO INIT AND SITE JS REMAINS THE SAME!) ...
    // --- KEEP ALL EXISTING FUNCTIONALITY AS BEFORE ---

    // ---------------------
    // PWA Install Banner
    // ---------------------
    (function(){
      var deferredPrompt = null;
      var banner = document.getElementById('pwa-install-banner');
      var installBtn = document.getElementById('pwa-install-btn');
      var dismissBtn = document.getElementById('pwa-install-dismiss');

      function isMobile() {
        // Simple mobile detection
        return window.matchMedia && window.matchMedia('(max-width: 780px)').matches;
      }

      window.addEventListener('beforeinstallprompt', function(e) {
        // Only show on mobile and if not dismissed
        if (!isMobile()) return;
        e.preventDefault(); // Prevent regular prompt
        deferredPrompt = e;
        if (!localStorage.getItem('pwaInstallBannerDismissed')) {
          banner.style.display = 'flex';
        }
      });

      if (installBtn && banner) {
        installBtn.addEventListener('click', function() {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(result) {
              if (result.outcome === 'accepted') {
                banner.style.display = 'none';
                localStorage.setItem('pwaInstallBannerDismissed', '1');
              }
            });
          }
        });
      }
      if (dismissBtn && banner) {
        dismissBtn.addEventListener('click', function() {
          banner.style.display = 'none';
          localStorage.setItem('pwaInstallBannerDismissed', '1');
        });
      }
      // Hide on desktop by default
      if (!isMobile()) {
        banner.style.display = 'none';
      }
      // Remove after install
      window.addEventListener('appinstalled', function() {
        banner.style.display = 'none';
        localStorage.setItem('pwaInstallBannerDismissed', '1');
      });
    })();
  </script>
