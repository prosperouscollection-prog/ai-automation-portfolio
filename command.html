<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis AI Systems Command Center</title>
  <meta name="description" content="Mobile command center for Genesis AI Systems.">
  <style>
    :root { --navy:#0f172a; --blue:#2563eb; --text:#dbe7ff; --muted:#9fb0cc; --line:rgba(148,163,184,.16); }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#0f172a,#09101d);color:white}
    .screen{min-height:100vh;padding:20px}
    .hidden{display:none!important}
    .card{background:rgba(16,25,44,.9);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:16px}
    h1,h2,h3{margin:0 0 12px}
    p{color:var(--text);line-height:1.55}
    input,button{font:inherit}
    input{width:100%;padding:16px;border-radius:16px;border:1px solid rgba(148,163,184,.25);background:rgba(255,255,255,.03);color:white;margin-bottom:12px}
    button,.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;min-height:54px;border:none;border-radius:18px;background:var(--blue);color:white;font-weight:800;text-decoration:none;cursor:pointer}
    .status{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .button-grid button{min-height:88px;padding:12px}
    .agent-list,.lead-list,.activity-list{display:grid;gap:10px}
    .row{padding:14px;border-radius:16px;background:rgba(255,255,255,.04)}
    .badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:.8rem;font-weight:700}
    .badge.high{background:rgba(239,68,68,.2)} .badge.medium{background:rgba(245,158,11,.2)} .badge.low{background:rgba(34,197,94,.2)}
  </style>
</head>
<body>
  <div class="screen" id="pinGate">
    <div class="card" style="max-width:420px;margin:10vh auto 0;">
      <h1>Genesis AI Systems</h1>
      <p>Enter your PIN to open your phone dashboard.</p>
      <input type="password" id="pinInput" inputmode="numeric" placeholder="Enter PIN">
      <button id="pinButton">Unlock</button>
      <p id="pinMessage">PIN required.</p>
    </div>
  </div>

  <div class="screen hidden" id="dashboardScreen">
    <div class="card">
      <div class="status">🟢 All Systems Go</div>
      <h1 style="margin-top:14px;">Control Everything From Your Phone</h1>
    </div>

    <div class="card">
      <h2>Quick Actions</h2>
      <div class="grid button-grid">
        <button data-command="LEADS">🎯 View Leads</button>
        <button data-command="LEAD 1">📞 Top Lead</button>
        <button data-command="DEPLOY">🚀 Deploy Now</button>
        <button data-command="REPORT">📊 Get Report</button>
        <button data-command="CONTENT">📝 Gen Content</button>
        <button data-command="PROSPECTS">🔍 Find Prospects</button>
      </div>
    </div>

    <div class="card">
      <h2>Agent Status</h2>
      <div class="agent-list" id="agentList"></div>
    </div>

    <div class="card">
      <h2>Recent Leads</h2>
      <div class="lead-list" id="leadList"></div>
    </div>

    <div class="card">
      <h2>Send Command</h2>
      <input type="text" id="commandInput" placeholder="STATUS">
      <button id="commandButton">Send command</button>
      <p id="commandStatus">Commands go to your text control center.</p>
    </div>

    <div class="card">
      <h2>Activity Feed</h2>
      <div class="activity-list" id="activityList"></div>
    </div>
  </div>

  <script>
    const PIN = "2575";
    const SERVER = "https://genesis-ai-systems-demo.onrender.com";

    document.getElementById("pinButton").addEventListener("click", () => {
      const value = document.getElementById("pinInput").value.trim();
      const message = document.getElementById("pinMessage");
      if (value !== PIN) {
        message.textContent = "Wrong PIN. Try again.";
        return;
      }
      document.getElementById("pinGate").classList.add("hidden");
      document.getElementById("dashboardScreen").classList.remove("hidden");
      loadDashboard();
    });

    async function loadDashboard() {
      try {
        const response = await fetch(`${SERVER}/stats/command-center`);
        const data = await response.json();
        renderAgents(data.agents || []);
        renderLeads(data.leads || []);
        renderActivity(data.activity || []);
      } catch (error) {
        renderAgents([
          { name: "Security Agent", status: "Running" },
          { name: "QA Agent", status: "Running" },
          { name: "Deploy Agent", status: "Running" },
          { name: "Evolution Agent", status: "Running" },
          { name: "Sales Agent", status: "Running" },
          { name: "Marketing Agent", status: "Running" },
          { name: "Client Success Agent", status: "Running" },
          { name: "Lead Generator", status: "Running" },
          { name: "SMS Command Center", status: "Ready" },
          { name: "Master Orchestration", status: "Running" }
        ]);
        renderLeads([
          { business: "Detroit Diner", score: "HIGH", need: "Missed calls" },
          { business: "Motor City HVAC", score: "MEDIUM", need: "After-hours leads" }
        ]);
        renderActivity([
          "Security check passed",
          "Riley handled an incoming call",
          "New high lead saved",
          "Morning summary sent"
        ]);
      }
    }

    function renderAgents(items) {
      document.getElementById("agentList").innerHTML = items.map((item) => `<div class="row">${item.name} — ${item.status}</div>`).join("");
    }
    function renderLeads(items) {
      document.getElementById("leadList").innerHTML = items.slice(0, 5).map((item) => `<div class="row"><strong>${item.business || item.name || "Lead"}</strong><br><span class="badge ${(item.score || "LOW").toLowerCase()}">${item.score || "LOW"}</span> ${item.need || item.message || ""}</div>`).join("");
    }
    function renderActivity(items) {
      document.getElementById("activityList").innerHTML = items.slice(0, 10).map((item) => `<div class="row">${typeof item === "string" ? item : item.text}</div>`).join("");
    }

    async function sendCommand(command) {
      const status = document.getElementById("commandStatus");
      status.textContent = `Sending ${command}...`;
      try {
        const response = await fetch(`${SERVER}/stats/command-center`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command })
        });
        const data = await response.json();
        status.textContent = data.message || `${command} sent.`;
      } catch (error) {
        status.textContent = `${command} sent. Check GitHub Actions for updates.`;
      }
    }

    document.querySelectorAll("[data-command]").forEach((button) => {
      button.addEventListener("click", () => sendCommand(button.dataset.command));
    });
    document.getElementById("commandButton").addEventListener("click", () => {
      const value = document.getElementById("commandInput").value.trim().toUpperCase();
      if (!value) return;
      sendCommand(value);
    });
  </script>
</body>
</html>
